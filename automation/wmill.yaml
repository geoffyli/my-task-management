# yaml-language-server: $schema=wmill.schema.json
# wmill.yaml — Windmill CLI configuration for task management automation

defaultTs: bun

# Owns: agent orchestration scripts only (dispatch, poll, webhook router)
includes:
  - "f/notion_tasks/dispatch_agent_task*"
  - "f/notion_tasks/poll_agent_sessions*"
  - "f/notion_tasks/tasks_webhook_router*"

excludes: []

skipVariables: false
skipResources: true
skipResourceTypes: false
skipSecrets: true
skipScripts: false
skipFlows: false
skipApps: false
skipFolders: false
skipWorkspaceDependencies: false
includeSchedules: true
includeTriggers: true
nonDottedPaths: true

codebases: []

gitBranches:
  main:
    overrides: {}
